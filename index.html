<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>한글 타자 디펜스</title>
<style>
  :root{
    --bg:#07080d; --bg2:#0c0f1a; --neon:#00f0ff; --neon2:#ff2bd6; --neon3:#b6ff3b;
    --txt:#e7ecff; --dim:#5b6480;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:radial-gradient(120% 120% at 50% -10%,var(--bg2),var(--bg) 60%);
    color:var(--txt);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;overflow:hidden}
  #wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
  #stage{position:relative;width:min(940px,96vw);height:min(680px,95vh);
    background:linear-gradient(180deg,rgba(0,240,255,0.03),rgba(255,43,214,0.03));
    border:1px solid rgba(0,240,255,0.25);border-radius:16px;
    box-shadow:0 0 40px rgba(0,240,255,0.12),inset 0 0 60px rgba(0,0,0,0.6);overflow:hidden}
  canvas{display:block;width:100%;height:100%}

  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;
    padding:12px 16px;font-size:14px;letter-spacing:.5px;text-shadow:0 0 8px rgba(0,240,255,.5);pointer-events:none}
  .hud-item b{color:var(--neon);font-variant-numeric:tabular-nums}
  #lvlTag{color:var(--neon3)}
  #weaponTag{color:var(--neon2)}

  /* 장착 무기 표시 */
  #equip{position:absolute;top:42px;left:50%;transform:translateX(-50%);font-size:13px;color:var(--dim);
    pointer-events:none;letter-spacing:.5px}
  #equip b{color:var(--neon2);font-size:15px}

  /* 버프 표시 */
  #buffs{position:absolute;left:50%;transform:translateX(-50%);bottom:206px;display:flex;gap:6px;
    flex-wrap:wrap;justify-content:center;max-width:90%;pointer-events:none}
  .buff{position:relative;font-size:11px;padding:3px 9px 5px;border-radius:8px;overflow:hidden;
    border:1px solid rgba(0,240,255,.4);background:rgba(0,240,255,.08);color:var(--neon)}
  .buff.nat{border-color:rgba(255,43,214,.5);background:rgba(255,43,214,.08);color:#ff8fe6}
  .buff .t{position:absolute;left:0;bottom:0;height:2px;background:currentColor;opacity:.8}

  #inputBar{position:absolute;left:50%;bottom:160px;transform:translateX(-50%);width:78%;max-width:480px;display:flex;gap:10px}
  #typed{flex:1;background:rgba(0,0,0,.55);border:1.5px solid var(--neon);border-radius:10px;color:var(--neon);
    font-size:22px;font-weight:700;text-align:center;letter-spacing:2px;padding:9px 14px;outline:none;
    box-shadow:0 0 18px rgba(0,240,255,.35);caret-color:var(--neon2)}
  #typed::placeholder{color:var(--dim);font-weight:400;letter-spacing:1px}

  #cards{position:absolute;left:0;right:0;bottom:16px;display:flex;justify-content:center;gap:9px;padding:0 12px;flex-wrap:wrap}
  .card{position:relative;min-width:80px;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:9px 11px 7px;border-radius:12px;transition:transform .1s,box-shadow .1s,border-color .1s}
  .card .w{font-size:17px;font-weight:800;letter-spacing:1px}
  .card .t{font-size:9.5px;color:var(--dim);letter-spacing:.3px;text-align:center;line-height:1.25}
  .card.weapon{background:rgba(0,240,255,.05);border:1.5px solid rgba(0,240,255,.4)}
  .card.weapon .w{color:var(--txt)}
  .card.nature{background:rgba(255,43,214,.07);border:1.5px solid rgba(255,43,214,.45)}
  .card.nature .w{color:#ff8fe6}
  .card.nature.t1{border-color:rgba(255,180,60,.7)} .card.nature.t1 .w{color:#ffd27a}
  .card.nature.t2{border-color:rgba(182,255,59,.8)} .card.nature.t2 .w{color:var(--neon3)}
  .card.adj{background:rgba(120,140,255,.06);border:1.5px solid rgba(120,140,255,.4)}
  .card.adj .w{color:#b9c4ff}
  .card.match{transform:translateY(-6px);box-shadow:0 0 16px rgba(0,240,255,.5)}

  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:rgba(5,6,12,.86);backdrop-filter:blur(3px);z-index:5;text-align:center;padding:24px}
  .overlay h1{font-size:34px;letter-spacing:4px;font-weight:800;
    background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(0,240,255,.3)}
  .overlay p{color:var(--dim);font-size:13.5px;line-height:1.7;max-width:520px}
  .overlay .big{color:var(--txt);font-size:15px}
  .btn{margin-top:8px;cursor:pointer;border:1.5px solid var(--neon);background:rgba(0,240,255,.08);color:var(--neon);
    font-size:16px;font-weight:700;letter-spacing:1px;padding:12px 32px;border-radius:10px;transition:all .15s;
    box-shadow:0 0 18px rgba(0,240,255,.25)}
  .btn:hover{background:rgba(0,240,255,.18);transform:translateY(-1px)}
  .hidden{display:none!important}
  .kbd{color:var(--neon3);font-weight:700}.pink{color:var(--neon2);font-weight:700}.cy{color:var(--neon);font-weight:700}
  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .legend span{font-size:12px;color:var(--dim)}.legend b{color:var(--neon3)}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="hud">
      <div class="hud-item">SCORE <b id="score">0</b></div>
      <div class="hud-item" id="lvlTag">LV <b id="level">1</b></div>
      <div class="hud-item">LIFE <b id="life">5</b></div>
    </div>
    <div id="equip" class="hidden"></div>
    <div id="buffs" class="hidden"></div>
    <div id="inputBar" class="hidden">
      <input id="typed" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
        placeholder="무기를 입력해 장착하세요" />
    </div>
    <div id="cards" class="hidden"></div>

    <div id="startScreen" class="overlay">
      <h1>한글 타자 디펜스</h1>
      <p class="big"><span class="cy">무기 카드</span>를 입력하면 장착 — 가장 가까운 적을 <b>자동</b>으로 공격합니다.<br/>
        다른 무기를 입력하기 전까지 계속 장착돼요.</p>
      <p><span class="pink">자연 카드</span>(불·얼음·물·대지·번개)와 <span style="color:#b9c4ff;font-weight:700">형용사 카드</span>를 입력하면
        장착 무기에 <span class="kbd">10초간</span> 강화가 얹힙니다.<br/>
        단, <b style="color:#ff8fe6">무기를 바꾸면 강화는 모두 사라져요.</b><br/>
        같은 원소를 <span class="kbd">3번</span> 쓰면 진화 카드가 등장 (불 → 화염 → 겁화, 3단).</p>
      <div class="legend">
        <span><b>불</b> 화상</span><span><b>얼음</b> 둔화</span><span><b>물</b> 젖음+넉백</span>
        <span><b>대지</b> 폭딜+관통</span><span><b>번개</b> 연쇄+감전</span>
      </div>
      <button class="btn" id="startBtn">게임 시작</button>
    </div>

    <div id="overScreen" class="overlay hidden">
      <h1>GAME OVER</h1>
      <p class="big">최종 점수 <span id="finalScore" class="kbd"></span> · 레벨 <span id="finalLevel" class="kbd"></span></p>
      <p id="overStats"></p>
      <button class="btn" id="retryBtn">다시 시작</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const now = () => performance.now();
  const rand=(a,b)=>a+Math.random()*(b-a), randi=(a,b)=>Math.floor(rand(a,b+1)), pick=a=>a[randi(0,a.length-1)];

  // ---------- 데이터 ----------
  const WEAPONS = {
    "단검":   {dmg:1, interval:380,  projSpeed:760,  pierce:0, aoe:0,  scatter:false, snipeTop:false, hue:190, hint:"빠른연사·단일"},
    "권총":   {dmg:2, interval:600,  projSpeed:700,  pierce:0, aoe:0,  scatter:false, snipeTop:false, hue:200, hint:"균형·단일"},
    "기관총": {dmg:1, interval:150,  projSpeed:650,  pierce:0, aoe:0,  scatter:true,  snipeTop:false, hue:170, hint:"초고속·분산"},
    "활":     {dmg:3, interval:1000, projSpeed:1150, pierce:0, aoe:0,  scatter:false, snipeTop:true,  hue:90,  hint:"저격·맨위적"},
    "창":     {dmg:2, interval:640,  projSpeed:700,  pierce:2, aoe:0,  scatter:false, snipeTop:false, hue:160, hint:"관통 라인"},
    "도끼":   {dmg:6, interval:1450, projSpeed:400,  pierce:0, aoe:62, scatter:false, snipeTop:false, hue:20,  hint:"광역·강타"},
  };
  const WEAPON_NAMES = Object.keys(WEAPONS);

  // 원소: tiers 이름, 기본 데미지배수, 효과
  const ELEMENTS = {
    "불":   {key:"fire",    tiers:["불","화염","겁화"],        dmgMul:1.5, effect:"burn",  hue:14},
    "얼음": {key:"ice",     tiers:["얼음","빙하","절대영도"],  dmgMul:1.1, effect:"slow",  hue:200},
    "물":   {key:"water",   tiers:["물","해일","심연"],        dmgMul:1.0, effect:"wet",   hue:220},
    "대지": {key:"earth",   tiers:["대지","지진","대격변"],    dmgMul:2.2, effect:"earth", hue:40},
    "번개": {key:"thunder", tiers:["번개","뇌전","천뢰"],      dmgMul:1.3, effect:"chain", hue:280},
  };
  const ELEM_NAMES = Object.keys(ELEMENTS);
  const TIER_DMG = [1, 1.8, 3.0];
  const TIER_AOE = [0, 26, 52];

  const ADJ = {
    "강한":     {dmgMul:2.0},
    "육중한":   {dmgMul:2.4, fireRateMul:0.8},
    "빠른":     {fireRateMul:1.6},
    "날랜":     {fireRateMul:1.9, dmgMul:0.9},
    "날카로운": {pierceAdd:2},
    "꿰뚫는":   {pierceAdd:3},
    "거대한":   {aoeAdd:40, dmgMul:1.2},
    "이중의":   {multishot:2},
    "쇄도하는": {multishot:3},
    "정확한":   {priorityTop:true},
  };
  const ADJ_NAMES = Object.keys(ADJ);
  const adjHint = m => {
    const t=[];
    if(m.dmgMul) t.push(m.dmgMul>=1?"데미지↑":"데미지↓");
    if(m.fireRateMul) t.push(m.fireRateMul>=1?"연사↑":"연사↓");
    if(m.pierceAdd) t.push("관통+"+m.pierceAdd);
    if(m.aoeAdd) t.push("광역↑");
    if(m.multishot) t.push(m.multishot+"연발");
    if(m.priorityTop) t.push("맨위적");
    return t.join(" ");
  };
  const BUFF_MS = 10000;

  // ---------- 캔버스 ----------
  const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
  let W=0,H=0,DPR=1;
  function resize(){
    const r=canvas.getBoundingClientRect();
    DPR=Math.min(window.devicePixelRatio||1,2); W=r.width; H=r.height;
    canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener("resize",resize);

  // ---------- 상태 ----------
  const FLOOR=0.74;
  let state="start";
  let enemies=[], projectiles=[], particles=[];
  let cards=[];                 // {type:'weapon'|'nature'|'adj', name, ...}
  let equipped=null;            // {name, ...WEAPONS[name]}
  let buffs=[];                 // {kind, label, nat, until, ...mods}
  let evolveCount={};           // evolveCount[elem][tier] = 사용횟수
  let pendingEvolve=null;       // 다음 consume 시 채울 진화카드
  let score=0, level=1, life=5;
  let killCount=0, evolveMade=0, weaponSwitch=0;
  let spawnTimer=0, spawnInterval=1600, fireTimer=0, lastTs=0;

  const SLOTS=6;

  // ---------- 카드 생성 ----------
  function makeWeaponCard(){ const n=pick(WEAPON_NAMES); return {type:"weapon",name:n,...WEAPONS[n]}; }
  function makeNatureCard(){ const e=pick(ELEM_NAMES); return {type:"nature",name:ELEMENTS[e].tiers[0],elem:e,tier:0}; }
  function makeAdjCard(){ const n=pick(ADJ_NAMES); return {type:"adj",name:n,mods:ADJ[n]}; }
  function makeCard(){
    const r=Math.random();
    if(r<0.25) return makeWeaponCard();
    if(r<0.72) return makeNatureCard();
    return makeAdjCard();
  }
  function initCards(){
    cards=[ makeWeaponCard(), makeWeaponCard() ];
    while(cards.length<SLOTS) cards.push(Math.random()<0.6?makeNatureCard():makeAdjCard());
    // 셔플
    for(let i=cards.length-1;i>0;i--){const j=randi(0,i);[cards[i],cards[j]]=[cards[j],cards[i]];}
    renderCards();
  }
  function cardLabel(c){
    if(c.type==="weapon") return c.hint;
    if(c.type==="adj") return adjHint(c.mods);
    // nature
    const base=({burn:"화상",slow:"둔화",wet:"젖음",earth:"폭딜·관통",chain:"연쇄·감전"})[ELEMENTS[c.elem].effect];
    return ["기본","2단","3단"][c.tier]+" "+base;
  }
  function renderCards(){
    const el=document.getElementById("cards"); el.innerHTML="";
    cards.forEach((c,i)=>{
      const d=document.createElement("div");
      let cls="card "+c.type;
      if(c.type==="nature"&&c.tier>0) cls+=" t"+c.tier;
      d.className=cls; d.dataset.idx=i;
      const w=document.createElement("div"); w.className="w"; w.textContent=c.name;
      const t=document.createElement("div"); t.className="t"; t.textContent=cardLabel(c);
      d.appendChild(w); d.appendChild(t); el.appendChild(d);
    });
  }
  function highlight(prefix){
    [...document.getElementById("cards").children].forEach(el=>{
      const c=cards[+el.dataset.idx];
      el.classList.toggle("match", !!(prefix && c.name.startsWith(prefix)));
    });
  }
  function consumeCard(idx){
    if(pendingEvolve){ cards[idx]=pendingEvolve; pendingEvolve=null; }
    else cards[idx]=makeCard();
    renderCards();
  }

  // ---------- 입력 처리 ----------
  const typedEl=document.getElementById("typed");
  function tryMatch(){
    const v=typedEl.value.trim();
    if(!v){ highlight(""); return; }
    highlight(v);
    const idx=cards.findIndex(c=>c.name===v);
    if(idx===-1) return;
    const c=cards[idx];
    if(c.type==="weapon") equipWeapon(c);
    else if(c.type==="nature") applyNature(c);
    else applyAdj(c);
    consumeCard(idx);
    typedEl.value=""; highlight("");
  }
  typedEl.addEventListener("input",tryMatch);
  typedEl.addEventListener("keydown",e=>{ if(e.key==="Enter"){tryMatch();typedEl.value="";highlight("");} });

  function equipWeapon(c){
    if(!equipped || equipped.name!==c.name) weaponSwitch++;
    equipped={name:c.name,...WEAPONS[c.name]};
    buffs=[];                 // 무기 교체 시 강화 전부 초기화
    fireTimer=0;
    updateEquip();
  }
  function applyNature(c){
    const E=ELEMENTS[c.elem], tierMul=TIER_DMG[c.tier];
    buffs.push({
      kind:"nature", nat:true, label:c.name, until:now()+BUFF_MS,
      dmgMul:E.dmgMul*tierMul, effect:E.effect, elem:c.elem, tier:c.tier,
      aoeAdd:TIER_AOE[c.tier], hue:E.hue,
    });
    // 진화 누적 (A: 같은 원소 3회)
    if(c.tier<2){
      evolveCount[c.elem]=evolveCount[c.elem]||[0,0,0];
      evolveCount[c.elem][c.tier]++;
      if(evolveCount[c.elem][c.tier]>=3){
        evolveCount[c.elem][c.tier]=0;
        pendingEvolve={type:"nature",name:E.tiers[c.tier+1],elem:c.elem,tier:c.tier+1};
        evolveMade++;
        flash(E.tiers[c.tier+1]+" 진화!", E.hue);
      }
    }
  }
  function applyAdj(c){
    buffs.push({kind:"adj",nat:false,label:c.name,until:now()+BUFF_MS,...c.mods});
  }

  let flashMsg=null;
  function flash(txt,hue){ flashMsg={txt,hue,until:now()+1400}; }

  // ---------- 유효 스탯 ----------
  function effStats(){
    const w=equipped;
    let dmgMul=1,fireRateMul=1,pierce=w.pierce,aoe=w.aoe,multishot=1,priorityTop=w.snipeTop,projMul=1;
    const effects=[];
    for(const b of buffs){
      if(b.dmgMul) dmgMul*=b.dmgMul;
      if(b.fireRateMul) fireRateMul*=b.fireRateMul;
      if(b.pierceAdd) pierce+=b.pierceAdd;
      if(b.aoeAdd) aoe+=b.aoeAdd;
      if(b.multishot) multishot=Math.max(multishot,b.multishot);
      if(b.priorityTop) priorityTop=true;
      if(b.effect){
        effects.push({effect:b.effect,tier:b.tier,elem:b.elem});
        if(b.effect==="earth"){ pierce+=1; projMul*=0.7; }
      }
    }
    return {
      dmg:Math.max(1,w.dmg*dmgMul), interval:w.interval/fireRateMul, projSpeed:w.projSpeed*projMul,
      pierce, aoe, multishot, priorityTop, effects, scatter:w.scatter, hue:w.hue,
    };
  }

  // ---------- 적 ----------
  function spawnEnemy(){
    const hp=1+Math.floor(level/2)+randi(0,1), r=15+hp*3;
    enemies.push({x:rand(r+12,W-r-12),y:-r,r,hp,maxHp:hp,
      speed:rand(18,27)+level*2.4, shape:randi(0,2), hue:pick([190,310,90,50,280]),
      wobble:rand(0,Math.PI*2),
      burnUntil:0,burnDps:0, slowUntil:0,slowFactor:1, freezeUntil:0, stunUntil:0, wet:false});
  }
  function aliveTargets(){ return enemies.filter(e=>!e.dead); }
  function pickTargets(n,top){
    const list=aliveTargets();
    if(list.length===0) return [];
    list.sort((a,b)=> top ? a.y-b.y : b.y-a.y); // top:맨위 / 기본:맨아래(임박)
    const out=[];
    for(let i=0;i<n;i++) out.push(list[Math.min(i,list.length-1)]);
    return out;
  }

  // ---------- 발사 ----------
  function autoFire(){
    if(!equipped) return;
    const st=effStats();
    if(aliveTargets().length===0) return;
    const count=Math.max(st.multishot, st.scatter?2:1);
    const targets=pickTargets(count, st.priorityTop);
    for(const t of targets){
      projectiles.push({
        x:W/2, y:H*FLOOR+26, target:t, speed:st.projSpeed, dmg:st.dmg,
        pierce:st.pierce, aoe:st.aoe, effects:st.effects, hue:st.hue, hitSet:new Set(), trail:[],
      });
    }
  }

  // ---------- 데미지/효과 ----------
  function rawDamage(e,amount){
    e.hp-=amount;
    if(e.hp<=0 && !e.dead){
      e.dead=true; killCount++; score+=10+level*2+e.maxHp*2;
      burst(e.x,e.y,e.hue,22); updateHUD(); maybeLevelUp();
    }
  }
  function applyEffect(e,ef,projHue){
    const tier=ef.tier||0, tm=TIER_DMG[tier];
    if(ef.effect==="burn"){ e.burnUntil=now()+2500; e.burnDps=1.4*tm; }
    else if(ef.effect==="slow"){
      const f=[0.6,0.4,0.0][tier];
      if(e.wet || f===0){ e.freezeUntil=now()+1200+tier*400; e.wet=false; }
      else { e.slowUntil=now()+1500; e.slowFactor=f; }
    }
    else if(ef.effect==="wet"){ e.wet=true; e.y-=10+tier*8; } // 젖음 + 넉백(위로)
    else if(ef.effect==="chain"){
      e.stunUntil=now()+250+tier*150;
      let extra=1+tier; // 연쇄 대상 수
      const others=aliveTargets().filter(o=>o!==e).sort((a,b)=>
        Math.hypot(a.x-e.x,a.y-e.y)-Math.hypot(b.x-e.x,b.y-e.y));
      for(let i=0;i<extra && i<others.length;i++){
        const o=others[i]; let d=1.5*tm; if(o.wet) d*=2;
        rawDamage(o,d); burst(o.x,o.y,280,6);
      }
    }
    // earth 효과는 스탯(관통/속도)으로 처리됨
  }
  function hitEnemy(p,e){
    if(p.hitSet.has(e)) return;
    p.hitSet.add(e);
    let dmg=p.dmg;
    const hasLightning=p.effects.some(x=>x.effect==="chain");
    if(e.wet && hasLightning) dmg*=2;          // 젖음+번개 = 2배
    rawDamage(e,dmg);
    for(const ef of p.effects) applyEffect(e,ef,p.hue);
    if(p.aoe>0){
      for(const o of aliveTargets()){
        if(o===e) continue;
        if(Math.hypot(o.x-e.x,o.y-e.y)<=p.aoe+o.r){
          rawDamage(o,Math.max(1,p.dmg*0.6));
          for(const ef of p.effects) applyEffect(o,ef,p.hue);
        }
      }
      burst(e.x,e.y,p.hue,16);
    }
    if(p.pierce>0){ p.pierce--; p.target=null; } else p.dead=true;
  }

  function burst(x,y,hue,n){
    for(let i=0;i<n;i++){ const a=rand(0,Math.PI*2),s=rand(40,230);
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.3,.7),age:0,hue}); }
  }

  // ---------- 업데이트 ----------
  function update(dt){
    const T=now();
    spawnTimer+=dt*1000;
    if(spawnTimer>=spawnInterval){ spawnTimer=0; spawnEnemy(); }

    // 자동 발사
    if(equipped){
      const st=effStats();
      fireTimer+=dt*1000;
      if(fireTimer>=st.interval){ fireTimer=0; autoFire(); }
    }

    // 버프 만료
    if(buffs.length) buffs=buffs.filter(b=>b.until>T);

    const floorY=H*FLOOR;
    for(const e of enemies){
      if(e.dead) continue;
      let sp=e.speed;
      if(e.freezeUntil>T || e.stunUntil>T) sp=0;
      else if(e.slowUntil>T) sp*=e.slowFactor;
      e.y+=sp*dt; e.wobble+=dt*2;
      if(e.burnUntil>T && e.burnDps>0) rawDamage(e,e.burnDps*dt);
      if(!e.dead && e.y-e.r>=floorY){
        e.dead=true; life--; burst(e.x,floorY,0,18); updateHUD();
        if(life<=0){ gameOver(); return; }
      }
    }

    for(const p of projectiles){
      let t=p.target;
      if(!t||t.dead){ const list=aliveTargets(); t=list.length?list.sort((a,b)=>b.y-a.y)[0]:null; p.target=t; }
      if(!t){ p.y-=p.speed*dt; if(p.y<-20)p.dead=true; continue; }
      const dx=t.x-p.x,dy=t.y-p.y,dist=Math.hypot(dx,dy)||1;
      p.x+=dx/dist*p.speed*dt; p.y+=dy/dist*p.speed*dt;
      p.trail.push({x:p.x,y:p.y}); if(p.trail.length>9)p.trail.shift();
      if(dist<t.r+6) hitEnemy(p,t);
    }

    for(const pt of particles){ pt.age+=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=240*dt; if(pt.age>=pt.life)pt.dead=true; }

    enemies=enemies.filter(e=>!e.dead);
    projectiles=projectiles.filter(p=>!p.dead);
    particles=particles.filter(p=>!p.dead);

    renderBuffs(T);
    if(flashMsg && flashMsg.until<T) flashMsg=null;
  }
  function maybeLevelUp(){
    const nl=1+Math.floor(killCount/8);
    if(nl>level){ level=nl; spawnInterval=Math.max(620,1600-level*90); updateHUD(); }
  }

  // ---------- 렌더 ----------
  function draw(){
    const T=now();
    ctx.clearRect(0,0,W,H);
    ctx.save(); ctx.globalAlpha=.12; ctx.strokeStyle="#1a6cff"; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.restore();

    const floorY=H*FLOOR;
    ctx.save(); ctx.strokeStyle="rgba(255,43,214,.5)"; ctx.lineWidth=2;
    ctx.shadowColor="rgba(255,43,214,.8)"; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(0,floorY); ctx.lineTo(W,floorY); ctx.stroke(); ctx.restore();

    // 포대
    const cx=W/2,cy=floorY+16,hue=equipped?equipped.hue:190;
    ctx.save(); ctx.fillStyle=`hsl(${hue},100%,60%)`; ctx.shadowColor=`hsl(${hue},100%,60%)`; ctx.shadowBlur=16;
    ctx.beginPath(); ctx.moveTo(cx-16,cy+14); ctx.lineTo(cx+16,cy+14); ctx.lineTo(cx,cy-16); ctx.closePath(); ctx.fill(); ctx.restore();

    for(const e of enemies) drawEnemy(e,T);

    for(const p of projectiles){
      ctx.save();
      ctx.strokeStyle=`hsla(${p.hue},100%,65%,.5)`; ctx.lineWidth=3;
      ctx.beginPath(); p.trail.forEach((t,i)=> i?ctx.lineTo(t.x,t.y):ctx.moveTo(t.x,t.y)); ctx.stroke();
      ctx.fillStyle=`hsl(${p.hue},100%,65%)`; ctx.shadowColor=`hsl(${p.hue},100%,65%)`; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(p.x,p.y, p.aoe>0?7:5, 0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    for(const pt of particles){ const a=1-pt.age/pt.life;
      ctx.save(); ctx.globalAlpha=Math.max(0,a); ctx.fillStyle=`hsl(${pt.hue},100%,65%)`;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2); ctx.fill(); ctx.restore(); }

    if(flashMsg){
      ctx.save(); ctx.globalAlpha=Math.min(1,(flashMsg.until-T)/600);
      ctx.font="800 26px Pretendard,system-ui,sans-serif"; ctx.textAlign="center";
      ctx.fillStyle=`hsl(${flashMsg.hue},100%,70%)`; ctx.shadowColor=`hsl(${flashMsg.hue},100%,60%)`; ctx.shadowBlur=18;
      ctx.fillText(flashMsg.txt, W/2, H*0.4); ctx.restore();
    }
  }
  function drawEnemy(e,T){
    const {x,y,r,hue}=e, wob=Math.sin(e.wobble)*2;
    ctx.save(); ctx.translate(x,y+wob);
    let glow=hue;
    if(e.freezeUntil>T) glow=200; else if(e.burnUntil>T) glow=14; else if(e.slowUntil>T) glow=210;
    ctx.shadowColor=`hsl(${glow},100%,60%)`; ctx.shadowBlur=16;
    ctx.strokeStyle=`hsl(${glow},100%,65%)`; ctx.fillStyle=`hsla(${glow},100%,55%,.13)`; ctx.lineWidth=2.5;
    ctx.beginPath();
    if(e.shape===0) ctx.arc(0,0,r,0,Math.PI*2);
    else if(e.shape===1){ ctx.moveTo(0,-r); ctx.lineTo(r*.9,r*.7); ctx.lineTo(-r*.9,r*.7); ctx.closePath(); }
    else ctx.rect(-r*.8,-r*.8,r*1.6,r*1.6);
    ctx.fill(); ctx.stroke(); ctx.restore();
    if(e.wet){ ctx.save(); ctx.fillStyle="rgba(80,160,255,.9)"; ctx.beginPath(); ctx.arc(x+r*.6,y+wob-r*.6,3,0,Math.PI*2); ctx.fill(); ctx.restore(); }
    if(e.maxHp>1){
      const bw=r*1.6,bh=4,bx=x-bw/2,by=y+wob-r-12;
      ctx.save(); ctx.fillStyle="rgba(255,255,255,.15)"; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle="#b6ff3b"; ctx.fillRect(bx,by,bw*Math.max(0,e.hp/e.maxHp),bh); ctx.restore();
    }
  }

  // ---------- HUD/UI ----------
  const $score=document.getElementById("score"),$level=document.getElementById("level"),$life=document.getElementById("life");
  function updateHUD(){ $score.textContent=score; $level.textContent=level; $life.textContent=Math.max(0,life); }
  function updateEquip(){
    const el=document.getElementById("equip");
    if(equipped){ el.classList.remove("hidden"); el.innerHTML=`장착: <b>${equipped.name}</b>`; }
    else { el.classList.add("hidden"); }
  }
  function renderBuffs(T){
    const el=document.getElementById("buffs");
    if(!buffs.length){ el.classList.add("hidden"); el.innerHTML=""; return; }
    el.classList.remove("hidden");
    el.innerHTML="";
    for(const b of buffs){
      const d=document.createElement("div"); d.className="buff"+(b.nat?" nat":"");
      d.textContent=b.label;
      const bar=document.createElement("div"); bar.className="t";
      bar.style.width=Math.max(0,(b.until-T)/BUFF_MS*100)+"%";
      d.appendChild(bar); el.appendChild(d);
    }
  }

  // ---------- 루프/흐름 ----------
  function loop(ts){
    if(state!=="playing") return;
    const dt=Math.min(0.05,(ts-lastTs)/1000||0); lastTs=ts;
    update(dt); if(state!=="playing") return; draw();
    requestAnimationFrame(loop);
  }
  function startGame(){
    resize();
    enemies=[];projectiles=[];particles=[];buffs=[];equipped=null;pendingEvolve=null;flashMsg=null;
    evolveCount={}; score=0;level=1;life=5;killCount=0;evolveMade=0;weaponSwitch=0;
    spawnTimer=0;spawnInterval=1600;fireTimer=0;state="playing";
    updateHUD(); updateEquip();
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("overScreen").classList.add("hidden");
    document.getElementById("inputBar").classList.remove("hidden");
    document.getElementById("cards").classList.remove("hidden");
    typedEl.value=""; initCards(); spawnEnemy(); spawnEnemy();
    typedEl.focus(); lastTs=performance.now(); requestAnimationFrame(loop);
  }
  function gameOver(){
    state="over";
    document.getElementById("finalScore").textContent=score;
    document.getElementById("finalLevel").textContent=level;
    document.getElementById("overStats").textContent=`처치 ${killCount} · 진화 ${evolveMade} · 무기교체 ${weaponSwitch}`;
    document.getElementById("inputBar").classList.add("hidden");
    document.getElementById("cards").classList.add("hidden");
    document.getElementById("buffs").classList.add("hidden");
    document.getElementById("equip").classList.add("hidden");
    document.getElementById("overScreen").classList.remove("hidden");
  }

  document.getElementById("startBtn").addEventListener("click",startGame);
  document.getElementById("retryBtn").addEventListener("click",startGame);
  document.getElementById("stage").addEventListener("click",()=>{ if(state==="playing")typedEl.focus(); });
  resize();
})();
</script>
</body>
